name: Weekly Sunday Resume Automation

on:
  schedule:
    # Runs every Sunday at 08:00 AM UTC (01:30 PM IST)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    # Allows you to trigger the pipeline manually from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fpdf2 pypdf PyYAML python-dotenv

      - name: Run Resume Automation Pipeline
        env:
          SMTP_SERVER: ${{ vars.SMTP_SERVER }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          python run_weekly.py

      - name: Upload Generated Resumes as Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Weekly_ATS_Resume_Pack
          path: outputs/
